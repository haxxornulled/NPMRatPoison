name: ci-release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore NpmRatPoison.slnx

      - name: Build
        run: dotnet build NpmRatPoison.slnx --configuration Release --no-restore /nr:false

      - name: Test
        run: dotnet test NpmRatPoison.slnx --configuration Release --no-build /nr:false

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: npmratpoison-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: npmratpoison-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows Service artifact
        if: matrix.rid == 'win-x64'
        run: >
          dotnet publish .\NpmRatPoison\NpmRatPoison.csproj
          /p:PublishProfile=WindowsService
          --output .\artifacts\publish\${{ matrix.artifact }}

      - name: Publish single-file
        if: matrix.rid != 'win-x64'
        run: >
          dotnet publish .\NpmRatPoison\NpmRatPoison.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true
          /p:DebugType=None
          --output .\artifacts\publish\${{ matrix.artifact }}

      - name: Optional Windows signing
        if: matrix.rid == 'win-x64' && env.WINDOWS_SIGN_CERT_BASE64 != '' && env.WINDOWS_SIGN_CERT_PASSWORD != ''
        shell: pwsh
        env:
          WINDOWS_SIGN_CERT_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_BASE64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f $certPath /p $env:WINDOWS_SIGN_CERT_PASSWORD /tr $env:WINDOWS_TIMESTAMP_URL /td sha256 /fd sha256 ".\artifacts\publish\${{ matrix.artifact }}\NpmRatPoison.exe"

      - name: Archive artifact
        shell: pwsh
        run: |
          Compress-Archive -Path ".\artifacts\publish\${{ matrix.artifact }}\*" -DestinationPath ".\artifacts\publish\${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: .\artifacts\publish\${{ matrix.artifact }}.zip
